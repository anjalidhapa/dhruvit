<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body onload="alert('welcome to webpage..')">
    <button onmouseover="alert('mouse in')" onmouseout="alert('mouse out')">Click me</button>
    <select name="city" id="city" onchange="fetch(this.value)">
        <option value="Bhavnagar">bhavnagar</option>
        <option value="Surat">surat</option>
        <option value="Rajkot">rajkot</option>
    </select>
    <p id="ans"></p>
    <script>
        function fetch(city) {
            // let city=document.getElementById("city").value;
            document.getElementById("ans").textContent = "you selected:" + city;
        }
    </script>
</body>

</html>
