<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>


        <script>


                class student
                {
                        constructor()
                        {
                            console.log("constructor is called");
                        }
                        get(no,name)                    
                        {
                            this.no=no;
                            this.name=name;
                        }
                        show()
                        {
                            console.log(`no:${this.no} and name:${this.name}`);
                        }
                }   
                let s1=new student();
                s1.get(1,"Dhruvit");
                s1.show();
                let s2=new student();
                s2.get(2,"Dhruv");
                s2.show();


        </script>

    
</body>
</html>
