<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <input type="text" onkeypress="get(this.value)">
    <p id="ans"></p>
    <script>
        function get(text) {
            document.getElementById("ans").textContent = text;
        }
    </script>
</body>

</html>
