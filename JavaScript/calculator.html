<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        background: linear-gradient(135deg, #74ebd5, #9face6);
        text-align: center;
        padding-top: 120px;
        font-family: Arial, Helvetica, sans-serif;
    }

    input {
        width: 240px;
        padding: 12px;
        margin: 10px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, .15);
    }

    input:focus {
        outline: none;
    }

    button {
        width: 60px;
        height: 45px;
        margin: 8px;
        border: none;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, .2);
        transition: .3s;
    }

    button:hover {
        background: #4338ca;
        transform: scale(1.1);
    }

    #ans {
        margin-top: 20px;
        font-size: 24px;
        color: #1f2933;
        background: white;
        display: inline-block;
        padding: 10px 25px;
        border-radius: 10px;
        box-shadow: 0 5px 10px rgba(0, 0, 0, .2);
    }
</style>

<body>

    <input type="number" placeholder="Enter first number" id="number">
    <input type="number" placeholder="Enter second number" id="number2">

    <br><br>

    <button onclick="calc('+')">+</button>
    <button onclick="calc('-')">-</button>
    <button onclick="calc('*')">*</button>
    <button onclick="calc('/')">/</button>

    <h1 id="ans"></h1>

    <script>

        function calc(op) {

            let n1 = Number(document.getElementById("number").value);
            let n2 = Number(document.getElementById("number2").value);
            let result;

            switch (op) {

                case '+':
                    result = n1 + n2;
                    break;
                case '-':
                    result = n1 - n2;
                    break;
                case '*':
                    result = n1 * n2;
                    break;
                case '/':
                    result = n1 / n2;
                    break;

            }
            document.getElementById("ans").innerHTML = "Result : " + result;
        }

    </script>

</body>

</html>
