<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Segoe UI, sans-serif;
    }

    body {
        height: 100vh;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    /* Input box */

    input {
        width: 280px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    /* Add Button */

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #22c55e;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #16a34a;
    }

    /* Task List */

    ol {
        margin-top: 20px;
        width: 300px;
    }

    /* Task Item */

    li {
        list-style: none;
        background: #1e293b;
        color: white;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Delete button inside list */

    li button {
        background: red;
        padding: 5px 10px;
        font-size: 12px;
    }

    li button:hover {
        background: darkred;
    }
</style>

<body>

    <input type="text" placeholder="Enter Task" id="task">
    <button onclick="AddTask()">
        Add Task
    </button>
    <ol id="tasklist"></ol>

    <script>
        function AddTask() {
            let input = document.getElementById("task")
            let list = document.getElementById("tasklist")
            let text = input.value;
            let li = document.createElement("li")
            li.textContent = text;
            let btn = document.createElement("button")
            btn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
 
            li.appendChild(btn);
            btn.addEventListener("click", () => {
                li.remove();
            })
            li.addEventListener("click", () => {
                li.style.backgroundColor = "gray";
            })
            list.appendChild(li);
            input.value = "";
        }
    </script>

</body>

</html>
