<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        function applyFunctionToArray(arr,func){
            return arr.map(func);
        }
        let numbers = [1,2,3,4];
        let result = applyFunctionToArray(numbers,(num) => num*2);
        console.log(result);
        
    </script>
</body>
