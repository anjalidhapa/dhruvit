<!DOCTYPE html>
<html>

<head>
    <title>Modern Movie App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #1f4037, #99f2c8, #243b55, #141e30);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            width: 420px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .search-box {
            display: flex;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px 0 0 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #ff416c;
            color: white;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4b2b;
        }

        .movie-card {
            margin-top: 20px;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .movie-card img:hover {
            transform: scale(1.05);
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .badges {
            margin: 8px 0;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            margin-right: 5px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .imdb {
            background: gold;
            color: black;
        }

        .meta {
            background: #00c3ff;
        }

        .rt {
            background: #ff4b2b;
        }

        p {
            font-size: 14px;
            margin: 5px 0;
        }

        .plot {
            margin-top: 8px;
            font-style: italic;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🎬 Movie Explorer</h2>

        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Enter Movie Name">
            <button onclick="getMovie()">Search</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function getMovie() {
            let movie = document.getElementById("movieInput").value;
            let apiKey = "f8cace21";

            let url = `https://www.omdbapi.com/?t=${movie}&apikey=${apiKey}`;

            try {
                let response = await fetch(url);
                let data = await response.json();

                if (data.Response === "True") {

                    document.getElementById("result").innerHTML = `
                <div class="movie-card">
                    <img src="${data.Poster}" alt="Poster">
                    <div class="title">${data.Title} (${data.Year})</div>

                    <div class="badges">
                        <span class="badge imdb">IMDb ${data.imdbRating}</span>
                        <span class="badge meta">Meta ${data.Metascore}</span>
                        <span class="badge rt">${data.Ratings[1] ? data.Ratings[1].Value : ''}</span>
                    </div>

                    <p><strong>Genre:</strong> ${data.Genre}</p>
                    <p><strong>Director:</strong> ${data.Director}</p>
                    <p><strong>Actors:</strong> ${data.Actors}</p>
                    <p class="plot">${data.Plot}</p>
                    <p><strong>Box Office:</strong> ${data.BoxOffice}</p>
                </div>
            `;
                } else {
                    document.getElementById("result").innerHTML = "Movie not found!";
                }

            } catch (error) {
                document.getElementById("result").innerHTML = "Error fetching data";
            }
        }
    </script>

</body>

</html>
