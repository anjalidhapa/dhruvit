<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrapper {
            background: black;  
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-direction: row;
        }

        .h1 {
            background: red;
            color: white;
            padding: 2rem;
            /* 1rem = 16px */
            height: 50px;
            /* margin: 0rem 1rem; */
        }

        .h1-2 {
            height: 100px;
        }

        .h1-3 {
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <h1 class="h1 h1-1">hi 1</h1>
        <h1 class="h1 h1-2">hi 2</h1>
        <h1 class="h1 h1-3">hi 3</h1>
    </div>
</body>

</html>
