<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("https://img.freepik.com/free-photo/abstract-flowing-neon-wave-background_53876-101942.jpg?semt=ais_hybrid&w=740&q=80") no-repeat center center/cover;
        }


        .login-box {
            width: 350px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
            color: white;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }

        .input-box {
            position: relative;
            margin: 20px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 16px;
        }

        .input-box label {
            position: absolute;
            left: 12px;
            top: 50%;
            color: #ddd;
            transition: .3s;
        }


        .options {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .options a {
            color: #ffd100;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            background: #ffdd33;
        }

        .signup {
            margin-top: 15px;
        }

        .signup a {
            color: #ffcc00;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>

        <form>
            <div class="input-box">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button class="btn">Login</button>

            <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
        </form>
    </div>

</body>

</html>
