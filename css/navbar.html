<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            margin:0px;
            padding:0px;
            box-sizing: border-box;
        }
        .navbar
        {
            height:100px;
            width:100%;
            display: flex;
            background-color: steelblue;
        }
        .navbar .logo
        {
            height:100%;
            width:20%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
            .navbar .menu
            {
                width:80%;
                height:100%;
            }
        .logo img
        {
            height:100%;
        }
        .menu ol 
        {
            height:100%;
            list-style-type: none;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .menu ol li
        {
            color:white;
            padding:40px 70px;
        }
        .menu ol li:hover
        {
            color:orangered;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <img src="https://png.pngtree.com/png-vector/20220705/ourmid/pngtree-food-logo-png-image_5687686.png" alt="">
        </div>
        <div class="menu">
            <ol>
                <li>Home</li>
                <li>Home</li>
                <li>Home</li>
                <li>Home</li>
                <li>Home</li>
                <li>Home</li>
                
            </ol>
        </div>
    </div>
    
</body>
</html>
