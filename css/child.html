<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div p:first-child {
        color: red;
      }
      div p:last-child {
        color: blue;
      }
      div p:nth-child(3) {
        color: green;
      }
      div p:first-child {
        color: rgb(98, 23, 105);
      }
    </style>
  </head>
  <body>
    <div>
      <p>Hello World</p>
      <p>Hello World</p>
      <p>Hello World</p>
      <p>Hello World</p>
    </div>
  </body>
</html>
