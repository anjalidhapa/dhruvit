<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eaeaea;
        }

        .container {
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .sidebar {
            width: 220px;
            background: #000;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            color: #fff;
            padding: 20px;
            cursor: pointer;
        }

        .sidebar ul li:hover {
            background: #d33131;
            border-radius: 5px;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .dashbord {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }

        .right-content {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .cards {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            height: 100px;
            padding: 20px;
            border-radius: 10px;
            background-image: url("https://images.pexels.com/photos/255379/pexels-photo-255379.jpeg");
            background-size: cover;
            background-position: center;
            color: #000;
            text-align: center;
        }

        .image-section {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .image-section img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="sidebar">
            <h1>Cosmos</h1>
            <ul>
                <li>Dashboard</li>
                <li>Courses</li>
                <li>Students</li>
                <li>Teachers</li>
                <li>Logout</li>
            </ul>
        </div>

        <div class="main">
            <div class="dashbord">
                <h1>Welcome to Dashboard</h1>
                <div class="right-content">
                    <span>Programming</span>
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <div class="cards">
                <div class="card">
                    <p>Total Students</p>
                    <p>45,890</p>
                </div>
                <div class="card">
                    <p>New Students</p>
                    <p>1,243</p>
                </div>
                <div class="card">
                    <p>Teachers</p>
                    <p>300</p>
                </div>
                <div class="card">
                    <p>Login</p>
                    <p>3,456</p>
                </div>
            </div>

            <div>
                <h1>COSMOS ACTIVITIES</h1>
            </div>
            <div class="image-section">
                <img src="https://littleinventors.in/wp-content/uploads/2023/07/Adobe-Photoshop-9-12yrs.png">
                <img src="https://static.vecteezy.com/system/resources/previews/001/558/710/non_2x/ui-ux-design-flat-landing-page-vector.jpg">
                <img src="https://zoople.in/wp-content/uploads/2022/08/Flutter-SocialMedia-Poster.jpg">
                <img src="https://www.himt.ac.in/images/Final%20Job%20Fair.jpg">
            </div>
        </div>

    </div>

</body>

</html>
