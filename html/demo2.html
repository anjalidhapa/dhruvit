<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        font-size: 200px;
        background-image: url(https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Hubble_ultra_deep_field.jpg/330px-Hubble_ultra_deep_field.jpg);
        -webkit-text-fill-color: transparent;
        -webkit-background-clip: text;
        background-size: 10%;
      }
      div {
        height: 400px;
        width: 400px;

        -webkit-mask-size: cover;
        background-image: url(https://static.vecteezy.com/system/resources/thumbnails/022/093/911/small/cloud-icon-in-flat-style-free-png.png);
        -webkit-mask-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRv3IZIYozjkgSGX-Ja2mfU9vb8inOegV4A_g&s);
      }
      img {
        width: 200px;
        height: 300px;
        border: solid 2px blue;
        object-position: -170px 0px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <div></div>

    <img src="https://www.w3schools.com/css/paris.jpg" alt="" />
  </body>
</html>
