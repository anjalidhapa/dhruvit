<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Exercices5</title>
  </head>
  <body bgcolor="#e8f5e9">
    <center>
      <br /><br /><br /><br /><br />
      <font face="Arial" size="6" color="#388e3c">
        <b>Register Here</b>
        <hr width="30%" color="#388e3c" />
        <hr width="30%" color="#388e3c" />
      </font>
      <table
        border="1"
        cellpadding="10"
        cellspace="10"
        width="50%"
        bgcolor="#ffffff"
      >
        <tr>
          <td colspan="2" align="center">
            <font face="Arial" size="4" color="#388e3c">
              <b>Registration Form</b>
            </font>
          </td>
        </tr>

        <td align="right">
          <font face="Arial" size="4" color="#388e3c"> Full Name: </font>
        </td>

        <td>
          <input
            type="text"
            name="name"
            placeholder="Enter Your Name"
            size="30"
          />
        </td>

        <tr>
          <td align="right">
            <font face="Arial" size="4" color="#388e3c"> Email: </font>
          </td>
          <td>
            <input
              type="email"
              name="email"
              placeholder="Enter Your Email"
              size="30"
            />
          </td>
        </tr>

        <tr>
            <td align="right">
            <font face="Arial" size="4" color="#388e3c"> Password: </font>
          </td>
         
          <td>
            <input
              type="password"
              name="password"
              placeholder="Enter Your Password"
              size="30"
            />
          </td>
        </tr>

        <tr>
            <td align="right">
            <font face="Arial" size="4" color="#388e3c"> Confirm Password: </font>
          </td>
          <td>
            <input
              type="password"
              name="password"
              placeholder="Confirm Your Password"
              size="30"
            />
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <font face="Arial" size="4" color="#388e3c">
              <button>Register</button>
            </font>
          </td>
        </tr>
       
            
        </td>
      </table>
    </center>
  </body>
</html>
