<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main {
        width: 12rem;
        height: 10rem;
        border-radius: 25px;
        position: relative;
        -webkit-box-pack: center;
        justify-content: center;
        -webkit-box-align: center;
        align-items: center;
        margin-bottom: 1rem;
        overflow: hidden;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
        background: rgb(2, 6, 23);
        border: 2px solid rgb(38, 35, 56);
        opacity: 1;
        transform: translateY(30px) scale(0.9);
        animation: 0.6s ease-out 0s 1 normal forwards running skillCardEntrance;
        cursor: pointer;
      }

      .border::before {
        content: "";
        position: absolute;
        width: 5rem;
        height: 20rem;
        left: 4.5rem;
        top: -40%;
        background: rgb(11, 3, 252);
        animation: 8s linear 0s infinite normal none running barra;
        border-radius: 10px;
        opacity: 1;
        transition: 0.4s;
      }
      .border::after {
        content: "";
        position: absolute;
        inset: 5px;
        background: rgb(13, 2, 13);
        border-radius: 20px;
        transition: 0.3s;
      }
      @keyframes barra {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
      .main img {
        z-index: 999;
      }
      .main h4 {
        z-index: 999;
        color:white;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <img
        src="https://saravana.vercel.app/_next/image?url=%2Ficons%2Fpython.png&w=64&q=75"
        alt=""
      />
      <h4>Python</h4>
        <div class="border"></div>
    </div>
  </body>
</html>
