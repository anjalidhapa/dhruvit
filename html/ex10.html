<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercices10</title>
</head>
<body bgcolor="#FF8FB7">
    <center>
    <h3>
        <font size="4" color="#433878">
        <h1>Welcome to Our Website</h1>
        </font>
        <font color="#7E60BF">
            <p>Your journey starts here. Please fill out the below.</p>
        </font>
        <h3>
        </center>
        <font size="4" color="#433878">
            <h2>Sign Up Form</h2>
        </font>
        <form action="#" method="post">
            <font size="4" color="#7E60BF">
                <label for="name">Full Name:</label>
                <br><br>
                <input type="text" name="name" size="40" placeholder="Enter your full name"required>
                <br><br>
                <label for="password">Password:</label>
                <br><br>
              <input type="password" name="password" size="40" placeholder="Create a password"required>
              <br><br>

              <fieldset>
                <legend><b>Gender:</b></legend>
                <label>
                    <input type="radio" name="gender" value="male" required>Male
                </label><br>
                <label>
                    <input type="radio" name="gender" value="female" required>Female
                </label><br>
                <label>
                    <input type="radio" name="gender" value="other" required>Other
                </label><br>
              </fieldset>
              <br>

              <label for="country">Select your country:</label>
              <br><br>
              <select name="country" required>

                <option value="">Choose your country</option>
                <option value="USA">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="INDIA">India</option>
                <option value="AUSTRALIA">Australia</option>
                <option value="CANADA">Canada</option>
              </select>
              <label>
              <input type="checkbox" name="terms" required>I agree to the
               <a href="#">terms and condition</a>
               </label>
               <br><br>
               <button type="Submit">
                    Sign Up
               </button>
            </font>
        </form>
        </h3>
    
    </center>

</body>
</html>
