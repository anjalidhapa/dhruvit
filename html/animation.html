<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div
        {
            height:100px;
            width:100px;
            background-color: aquamarine;
            animation-name: ani1;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-delay: 0s;
            position: relative;
        }
        @keyframes ani1
        {
            0%
            {
                transform: rotate(0deg);
                left:0px;
                top:0px;
                border-radius: 0px;
            }
            25%
            {
                top:0px;
                left:700px;
                border-radius: 50%;
                transform: rotate(360deg);
            }
            50%
            {
                left:700px;
                top:500px;
            }
            75%
            {
                top:500px;
                left:0px;
                border-radius: 0px;
            }
            100%
            {
                top:0px;
                left:0px;
            }
        }
    </style>
</head>
<body>

    <div></div>
    
</body>
</html>
