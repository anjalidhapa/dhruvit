<!doctype html>
<html>
  <head>
    <title>AI Chatbot</title>
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
      }

      #chat {
        width: 400px;
        height: 400px;
        margin: auto;
        overflow-y: auto;
        background: white;
        padding: 10px;
        border-radius: 10px;
      }

      .user {
        background: #d1e7dd;
        padding: 10px;
        margin: 5px;
        border-radius: 10px;
        text-align: right;
      }

      .bot {
        background: #f8d7da;
        padding: 10px;
        margin: 5px;
        border-radius: 10px;
        text-align: left;
      }

      /* code block styling */
      pre {
        background: #222;
        color: #0f0;
        padding: 10px;
        border-radius: 5px;
        overflow-x: auto;
      }

      code {
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    <h2>AI Chatbot</h2>

    <div id="chat"></div>

    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
