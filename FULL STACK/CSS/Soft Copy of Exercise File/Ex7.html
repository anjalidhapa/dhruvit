<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>COSMOS COMPUTER</title>
   <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }

    /* Body and Global Font */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7fa;
        color: #333;
        display: flex;
    }

    /* Sidebar Styling */
    .sidebar {
        width: 250px;
        background-color: #2c3e50;
        color: white;
        height: 100vh;
        padding-top: 30px;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
    }

    .sidebar-header {
        text-align: center;
        padding: 20px;
        font-size: 1.8em;
        font-weight: bold;
    }

    nav ul {
        list-style: none;
        padding: 0;
    }

    nav ul li {
        margin: 20px 0;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        display: block;
        padding: 12px 20px;
        font-size: 1.1em;
        border-radius: 5px;
        transition: background-color 0.3s ease, padding-left 0.3s ease;
    }

    nav ul li a:hover {
        background-color: #34495e;
        padding-left: 30px;
    }

    /* Main Content Styling */
    .main-content {
        margin-left: 250px;
        padding: 30px;
        width: 100%;
    }

    header {
        margin-bottom: 30px;
    }

    .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .top-nav h1 {
        font-size: 2em;
        color: #34495e;
    }

    .user-info {
        display: flex;
        align-items: center;
    }

    .user-info span {
        margin-right: 10px;
    }

    .user-avatar {
        border-radius: 50%;
    }

    /* Dashboard Cards */
    .dashboard-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .card {
        background-color: white;
        padding: 20px;
        background-image:url(https://t4.ftcdn.net/jpg/05/49/86/39/360_F_549863991_6yPKI08MG7JiZX83tMHlhDtd6XLFAMce.jpg);
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
        background-size:100%;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .card h3 {
        font-size: 1.5em;
        color:white;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 2em;
        color:white;
        font-weight: bold;
    }

    /* Analytics Section */
    .analytics {
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
    }

    .chart-container {
        width: 100%;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .chart-container h2 {
        font-size: 1.8em;
        margin-bottom: 20px;
    }

    .chart {
        height: 250px;
        background-color: #ecf0f1;
        border-radius: 8px;
        position: relative;
        display:flex;
        justify-content:space-around;
    }

    .fake-chart {
        width:20%;
        height:300px;
         border-radius: 8px;
         background-size:100%;
         background-repeat:no-repeat;
    }

    /* Recent Activity */
    .recent-activity {
        width: 30%;
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .recent-activity h2 {
        font-size: 1.8em;
        margin-bottom: 20px;
    }

    .recent-activity ul {
        list-style: none;
        padding: 0;
    }

    .recent-activity ul li {
        margin: 10px 0;
        font-size: 1.2em;
    }

    .recent-activity ul li span {
        font-weight: bold;
        color: #3498db;
    }

   </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>COSMOS</h2>
        </div>
        <nav>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Students</a></li>
                <li><a href="#">Teachers</a></li>
                <li><a href="#">Settings</a></li>
                <li><a href="#">Logout</a></li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navigation -->
        <header>
            <div class="top-nav">
                <h1>Welcome to Dashboard</h1>
                <div class="user-info">
                    <span>Programming</span>
                    <img src="https://static.thenounproject.com/png/1743561-200.png" height="30px" alt="User Profile" class="user-avatar">
                </div>
            </div>
        </header>

        <!-- Dashboard Overview Cards -->
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Students</h3>
                <p>45,890</p>
            </div>
            <div class="card">
                <h3>New Students</h3>
                <p>1,243</p>
            </div>
            <div class="card">
                <h3>Teachers</h3>
                <p>300</p>
            </div>
            <div class="card">
                <h3>Login</h3>
                <p>3,456</p>
            </div>
        </div>

        <!-- Analytics and Recent Activity -->
        <section class="analytics">
            <div class="chart-container">
                <h2>COSMOS ACTIVITIES</h2>
                <div class="chart">
                    <div class="fake-chart"style="background-image:url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnJUGtAX2vr7K6henv6TidoyvcD5DjwCyindshozWiMVium9uf2qpTWg1RwD1lFY085is&usqp=CAU);"></div>
                    <div class="fake-chart" style="background-image:url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRa4wy1JoNLQ9HqsuJhA2wYtVWFebA1QYgzdSLJhjSzXrZmm-z3UJfNW8q2pLc5cXBvuVM&usqp=CAU);"></div>
                    <div class="fake-chart" style="background-image:url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROeXSwi4L3I_PGRAXzMqhZZGCb72jgNcEFQQ&s);"></div>
                    <div class="fake-chart" style="background-image:url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScazN1uCYnTMrIEKaoZS6u-6VJ5lQe8nNuEQ&s);"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
