<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styling Example</title>
    <style>
        div {
            height: 150px;
            width: 100%;
            border: solid 1px;
            background-image: linear-gradient(rgb(135, 219, 180), rgb(46, 143, 83), rgb(5, 66, 20));
        }

        h1 {
            color: brown;
        }
    </style>
</head>

<body>
    <div>
        <h1>Welcome to My Website</h1>
        <p>This is a sample paragraph with some styled text.</p>
        <p class="highlight">This is a highlighted text with different styles!</p>
    </div>
    <br>
    <div>
        <h1>Welcome to My Website</h1>
        <p>This is a Demo paragraph with some styled text.</p>
        <p class="highlight">This is a highlighted text with different styles!</p>
    </div>
</body>

</html>
