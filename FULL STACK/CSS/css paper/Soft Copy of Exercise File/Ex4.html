<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attractive Background Design</title>

    <style>
        /* styles.css */
        body {

            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        .background-box {
            width: 80%;
            text-align: center;
            background: linear-gradient(45deg, #84fab0, #8fd3f4);
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="background-box">
        <br>
        <h1>Creative Background Design</h1>
        <p>This is an example of using CSS background properties to create an attractive design.</p>
    </div>
</body>

</html>
