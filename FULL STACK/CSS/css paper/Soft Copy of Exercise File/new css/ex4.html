<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url(https://t4.ftcdn.net/jpg/02/96/21/41/360_F_296214127_8uC9vS6ig4gbaaKSQ9vLi6dYL7l9pmSo.jpg);
            background-size: cover;
            color: #333;
            height: 90vh;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: #58585883;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #007BFF;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input,
        textarea {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            padding: 12px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Contact Me</h2>
        <form action="https://formspree.io/f/your-form-id" method="POST">
            <input type="text" name="name" placeholder="Your Name" required
                style="background-image:url(user-solid.svg); background-repeat: no-repeat; background-size:3%; background-position:565px 11px" />
            <input type="email" name="email" placeholder="Your Email" required
                style="background-image:url(envelope-solid.svg); background-repeat: no-repeat; background-size:3%; background-position:565px 11px" />
            <textarea name="message" placeholder="Your Message" required
                style="background-image:url(message-solid.svg); background-repeat: no-repeat; background-size:3%; background-position:565px 11px"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>



</body>

</html>
